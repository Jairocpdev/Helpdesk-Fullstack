<h2>Emita o seu novo chamado aqui:</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()">

  <label>Título</label>
  <input type="text" formControlName="titulo" placeholder="Digite o título do chamado" />

  <label>Descrição:</label>
  <textarea formControlName="descricao" rows="5" placeholder="Descreva o problema"></textarea>
  
  <label for="prioridade">Prioridade:</label>
<select id="prioridade" formControlName="prioridade">
  <option value="Baixa">Baixa</option>
  <option value="Média">Média</option>
  <option value="Alta">Alta</option>
</select>

<label for="status">Status</label>
  <select id="status" formControlName="status">
  <option value="Aberto">Aberto</option>
  <option value="Em_andamento">Em Andamento</option>
  <option value="Concluido">Concluído</option>
</select>

  <button type="submit" routerLink="/dashboard">Abrir Chamado</button>

</form>
